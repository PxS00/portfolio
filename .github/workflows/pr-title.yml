name: PR Validation

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

jobs:
  title:
    name: title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: "The subject of the PR title must start with a lowercase letter and follow Conventional Commits."
